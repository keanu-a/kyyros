spring.application.name=kyyros

spring.config.import=optional:file:.env.properties

spring.datasource.url=${SUPABASE_DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

supabase.jwks.url=${SUPABASE_JWKS_URL}

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

aws.accessKeyId=${AWS_ACCESS_KEY}
aws.secretKey=${AWS_SECRET_ACCESS_KEY}
aws.s3.bucket=${AWS_S3_BUCKET_NAME}
aws.region=${AWS_REGION}

mux.token.id=${MUX_TOKEN_ID}
mux.token.secret=${MUX_SECRET_KEY}
mux.webhook.secret=${MUX_WEBHOOK_SECRET}

spring.data.web.pageable.max-page-size=50