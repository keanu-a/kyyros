name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  review-backend:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.backend == 'true' &&
      contains(github.event.pull_request.labels.*.name, 'ai-review')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            SCOPE: backend/ (Spring Boot 3, Java 25)

            Note: The PR branch is already checked out in the working directory.
            You can read files directly with your built-in tools, or use
            `gh pr diff` / `gh pr view` for diff/metadata.

            This is the Kyrros backend — a video platform with Supabase JWT auth,
            S3 uploads, and (planned) Mux transcoding. Focus your review on files
            under backend/. Look for:

            - Logic errors and unhandled edge cases
            - Spring Security & exception handling: are the right exception types
              caught, does the response leak stack traces or sensitive info,
              are HTTP status codes correct
            - API contract consistency (DTO records, error response shape)
            - Missing input validation on controller params / request bodies
            - JPA pitfalls (e.g. @Data on entities, N+1, missing transactional boundaries)
            - Test coverage gaps for new logic

            Be selective: post a maximum of 5 inline comments per review, only for
            concrete, actionable issues. Skip minor observations and pure style nits.

            Use mcp__github_inline_comment__create_inline_comment (with confirmed: true)
            for inline comments. Then finish with one short paragraph summary posted via
            `gh pr comment`. Don't post review text as a chat message.

          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 15
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh search:*)"

  review-frontend:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.backend == 'true' &&
      contains(github.event.pull_request.labels.*.name, 'ai-review')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            SCOPE: frontend/ (Next.js, TypeScript, Tailwind CSS)

            Note: The PR branch is already checked out in the working directory.
            You can read files directly with your built-in tools, or use
            `gh pr diff` / `gh pr view` for diff/metadata.

            This is the Kyrros frontend — a Next.js app talking to a Spring Boot
            backend and Supabase. Focus your review on files under frontend/.
            Look for:

            - Logic errors and unhandled edge cases
            - React anti-patterns (missing keys, stale closures, effect dependency
              issues, unnecessary re-renders)
            - TypeScript looseness (any, unsafe casts, missing null checks)
            - Auth handling (JWT storage, token refresh, protected routes)
            - Accessibility gaps on interactive elements
            - Missing error/loading states on async UI
            - Test coverage gaps for new logic

            Be selective: post a maximum of 5 inline comments per review, only for
            concrete, actionable issues. Skip minor observations and pure style nits.

            Use mcp__github_inline_comment__create_inline_comment (with confirmed: true)
            for inline comments. Then finish with one short paragraph summary posted via
            `gh pr comment`. Don't post review text as a chat message.

          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 15
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh search:*)"